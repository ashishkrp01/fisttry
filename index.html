<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        display:flex;
        justify-content:center;
        align-items:center;
        height:100vh;
        background:#1e1e1e;
    }

    .calculator{
        width:320px;
        background:#2c2c2c;
        padding:20px;
        border-radius:15px;
        box-shadow:0 10px 25px rgba(0,0,0,0.4);
    }

    #display{
        width:100%;
        height:70px;
        border:none;
        outline:none;
        background:#111;
        color:#fff;
        font-size:2rem;
        text-align:right;
        padding:10px;
        border-radius:10px;
        margin-bottom:15px;
    }

    .buttons{
        display:grid;
        grid-template-columns:repeat(4,1fr);
        gap:10px;
    }

    button{
        height:60px;
        border:none;
        border-radius:10px;
        font-size:1.3rem;
        cursor:pointer;
        transition:0.2s;
    }

    button:hover{
        opacity:0.8;
    }

    .num{
        background:#444;
        color:white;
    }

    .operator{
        background:#ff9500;
        color:white;
    }

    .clear{
        background:#ff3b30;
        color:white;
    }

    .equal{
        background:#34c759;
        color:white;
        grid-column:span 2;
    }
</style>
</head>
<body>

<div class="calculator">
    <input type="text" id="display" readonly>

    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="operator" onclick="appendValue('/')">/</button>
        <button class="operator" onclick="appendValue('*')">×</button>
        <button class="operator" onclick="appendValue('-')">−</button>

        <button class="num" onclick="appendValue('7')">7</button>
        <button class="num" onclick="appendValue('8')">8</button>
        <button class="num" onclick="appendValue('9')">9</button>
        <button class="operator" onclick="appendValue('+')">+</button>

        <button class="num" onclick="appendValue('4')">4</button>
        <button class="num" onclick="appendValue('5')">5</button>
        <button class="num" onclick="appendValue('6')">6</button>
        <button class="operator" onclick="backspace()">⌫</button>

        <button class="num" onclick="appendValue('1')">1</button>
        <button class="num" onclick="appendValue('2')">2</button>
        <button class="num" onclick="appendValue('3')">3</button>
        <button class="num" onclick="appendValue('.')">.</button>

        <button class="num" onclick="appendValue('0')">0</button>
        <button class="equal" onclick="calculate()">=</button>
    </div>
</div>

<script>
    const display = document.getElementById("display");

    function appendValue(value){
        display.value += value;
    }

    function clearDisplay(){
        display.value = "";
    }

    function backspace(){
        display.value = display.value.slice(0, -1);
    }

    function calculate(){
        try{
            display.value = eval(display.value);
        }catch{
            display.value = "Error";
        }
    }
</script>

</body>
</html>
